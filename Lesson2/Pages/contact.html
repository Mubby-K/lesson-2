<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    </title>
</head>
<body>
  <div><!-- main container -->
    <div>
<!--container for my image-->
<img src="https://images.websitebuilderexpert.com/wp-content/uploads/2023/02/13045442/Contact-Us-Page-Examples.jpg" alt="contact us image">
</div>
    <div><!-- container for my form -->
<form action="" method="get">
<label for="fullName">Full Name:</label>
<input type="text" id="fullName" name="fullName"><br>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email"><br>

    <label for="Phone Number">Phone Number:</label>
    <input type="tel" id="phone" name="phone"><br>

    <textarea name="message" id="message" cols="30" rows="10" placeholder="Tell us the issue you are having..."></textarea><br>
    <input type="submit" value="Submit">
</form>
    </div> 
  </div>
